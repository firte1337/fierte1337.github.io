<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fierte | Developer</title>
    <link rel="icon" type="image/png" href="avatar.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: #000;
            color: #fff;
            overflow-x: hidden;
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .floating-spheres {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .sphere {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.01));
            backdrop-filter: blur(20px);
            box-shadow: inset 0 0 50px rgba(255, 255, 255, 0.05), 0 0 80px rgba(255, 255, 255, 0.02);
        }

        .sphere-1 {
            width: 400px;
            height: 400px;
            top: -100px;
            left: -100px;
            animation: floatSphere1 25s ease-in-out infinite;
        }

        .sphere-2 {
            width: 300px;
            height: 300px;
            top: 20%;
            right: -50px;
            animation: floatSphere2 30s ease-in-out infinite;
        }

        .sphere-3 {
            width: 250px;
            height: 250px;
            bottom: 10%;
            left: 10%;
            animation: floatSphere3 20s ease-in-out infinite;
        }

        .sphere-4 {
            width: 350px;
            height: 350px;
            bottom: -100px;
            right: 15%;
            animation: floatSphere4 28s ease-in-out infinite;
        }

        @keyframes floatSphere1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(100px, 150px) scale(1.1); }
        }

        @keyframes floatSphere2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-80px, 100px) scale(0.9); }
        }

        @keyframes floatSphere3 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(120px, -80px) scale(1.15); }
        }

        @keyframes floatSphere4 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-100px, -120px) scale(0.95); }
        }

        #particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: float 20s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) translateX(50px); opacity: 0; }
        }

        #heart-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
        }

        .minimal-heart {
            position: absolute;
            width: 16px;
            height: 16px;
            background: #fff;
            transform: rotate(45deg);
            animation: heartFloat 2s ease-out forwards;
        }

        .minimal-heart::before,
        .minimal-heart::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            background: #fff;
            border-radius: 50%;
        }

        .minimal-heart::before {
            left: -8px;
            top: 0;
        }

        .minimal-heart::after {
            top: -8px;
            left: 0;
        }

        @keyframes heartFloat {
            0% { transform: rotate(45deg) scale(0); opacity: 1; }
            20% { transform: rotate(45deg) scale(1); opacity: 1; }
            100% { transform: rotate(45deg) scale(0.3) translateY(-200px); opacity: 0; }
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1.5rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            color: #fff;
            cursor: pointer;
            user-select: none;
            transition: opacity 0.3s ease;
            background: linear-gradient(180deg, #fff 0%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo:hover {
            opacity: 0.7;
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            list-style: none;
        }

        .nav-links a {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 0.85rem;
            letter-spacing: 0.15em;
            position: relative;
            transition: color 0.3s ease;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 1px;
            background: #fff;
            transition: width 0.3s ease;
        }

        .nav-links a:hover {
            color: #fff;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .hero {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 5% 50px;
        }

        .hero-content {
            text-align: center;
            max-width: 800px;
        }

        .hero h1 {
            font-size: clamp(4rem, 15vw, 10rem);
            font-weight: 100;
            letter-spacing: 0.3em;
            margin-bottom: 1.5rem;
            animation: fadeIn 1.5s ease-out;
            background: linear-gradient(180deg, #fff 0%, #666 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hero-subtitle {
            font-size: clamp(1rem, 2.5vw, 1.3rem);
            font-weight: 300;
            letter-spacing: 0.4em;
            margin-bottom: 3rem;
            opacity: 0.6;
            animation: fadeIn 1.5s ease-out 0.3s backwards;
            line-height: 1.6;
            position: relative;
        }

        #dev-text {
            position: relative;
            display: inline-block;
            transition: all 0.1s;
        }

        #dev-text.glitch {
            animation: glitch 0.3s ease-in-out;
        }

        #dev-text.glitch-red {
            color: #ff0040;
            animation: glitch 0.15s ease-in-out;
        }

        #dev-text.blur {
            filter: blur(4px);
            opacity: 0.7;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-3px, 2px); }
            40% { transform: translate(3px, -2px); }
            60% { transform: translate(-2px, -3px); }
            80% { transform: translate(2px, 3px); }
            100% { transform: translate(0); }
        }

        .hero-cta {
            animation: fadeIn 1.5s ease-out 0.6s backwards;
        }

        .cta-btn {
            display: inline-block;
            padding: 1.2rem 3rem;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            text-decoration: none;
            font-size: 0.85rem;
            letter-spacing: 0.2em;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .cta-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.05);
            transition: left 0.4s ease;
        }

        .cta-btn:hover::before {
            left: 100%;
        }

        .cta-btn:hover {
            border-color: rgba(255, 255, 255, 0.6);
            transform: translateY(-2px);
        }

        .scroll-indicator {
            position: absolute;
            bottom: 3rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
        }

        .mouse {
            width: 24px;
            height: 40px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            position: relative;
        }

        .wheel {
            width: 3px;
            height: 8px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 2px;
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            animation: scroll 2s ease-in-out infinite;
        }

        @keyframes scroll {
            0%, 100% { opacity: 0; transform: translateX(-50%) translateY(0); }
            50% { opacity: 1; transform: translateX(-50%) translateY(10px); }
        }

        section {
            position: relative;
            z-index: 2;
            padding: 8rem 5%;
        }

        .section-header {
            margin-bottom: 4rem;
            text-align: center;
        }

        .section-title {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 100;
            letter-spacing: 0.2em;
            background: linear-gradient(180deg, #fff 0%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .section-subtitle {
            display: block;
            margin-top: 1rem;
            font-size: 0.9rem;
            letter-spacing: 0.3em;
            opacity: 0.5;
            font-weight: 300;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
            max-width: 1000px;
            margin: 0 auto;
        }

        .project-card {
            padding: 2.5rem;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .project-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.03), transparent);
            transition: left 0.5s ease;
        }

        .project-card:hover::before {
            left: 100%;
        }

        .project-card:hover {
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-4px);
        }

        .project-status {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            border: 1px solid rgba(255, 255, 255, 0.15);
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            margin-bottom: 1.5rem;
            opacity: 0.7;
        }

        .project-title {
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
        }

        .project-desc {
            font-size: 0.95rem;
            line-height: 1.6;
            opacity: 0.6;
            margin-bottom: 1.5rem;
        }

        .project-tech {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .tech-tag {
            padding: 0.4rem 0.8rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.8rem;
            opacity: 0.6;
            letter-spacing: 0.05em;
        }

        .skills-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .skill-item {
            margin-bottom: 2rem;
        }

        .skill-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.8rem;
            font-size: 0.9rem;
            letter-spacing: 0.1em;
        }

        .skill-name {
            opacity: 0.8;
        }

        .skill-level {
            opacity: 0.5;
        }

        .skill-bar {
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .skill-progress {
            height: 100%;
            background: #fff;
            width: 0;
            transition: width 1s ease;
            position: relative;
        }

        .contact {
            text-align: center;
        }

        .contact-text {
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: 0.1em;
            opacity: 0.6;
            margin-bottom: 3rem;
            line-height: 1.8;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 2rem;
        }

        .social-link {
            width: 56px;
            height: 56px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .social-link:hover {
            border-color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.05);
            transform: translateY(-2px);
        }

        footer {
            position: relative;
            z-index: 2;
            padding: 3rem 5%;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        footer p {
            opacity: 0.4;
            font-size: 0.85rem;
            letter-spacing: 0.1em;
        }

        .fade-in {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s ease;
        }

        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }

        @media (max-width: 768px) {
            nav {
                padding: 1rem 5%;
            }

            .nav-links {
                gap: 1.5rem;
            }

            .nav-links a {
                font-size: 0.75rem;
            }

            section {
                padding: 4rem 5%;
            }

            .projects-grid {
                grid-template-columns: 1fr;
            }

            .hero h1 {
                font-size: clamp(2.5rem, 12vw, 4rem);
                letter-spacing: 0.15em;
            }

            .hero-subtitle {
                font-size: 0.75rem;
                letter-spacing: 0.2em;
            }

            .cta-btn {
                padding: 1rem 2rem;
                font-size: 0.8rem;
            }

            .project-card {
                padding: 1.5rem;
            }

            .project-title {
                font-size: 1.2rem;
            }

            .scroll-indicator {
                display: none;
            }

            .social-links {
                gap: 1.5rem;
            }

            .social-link {
                width: 48px;
                height: 48px;
            }

            .sphere-1 { width: 200px; height: 200px; top: -50px; left: -50px; }
            .sphere-2 { width: 150px; height: 150px; top: 30%; right: -30px; }
            .sphere-3 { width: 120px; height: 120px; bottom: 20%; left: 5%; }
            .sphere-4 { width: 180px; height: 180px; bottom: -50px; right: 10%; }
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <div class="floating-spheres">
        <div class="sphere sphere-1"></div>
        <div class="sphere sphere-2"></div>
        <div class="sphere sphere-3"></div>
        <div class="sphere sphere-4"></div>
    </div>
    <div id="particles"></div>
    <div id="heart-container"></div>

    <nav>
        <div class="logo" id="logo">FIERTE</div>
        <ul class="nav-links">
            <li><a href="#projects">ПРОЕКТЫ</a></li>
            <li><a href="#skills">НАВЫКИ</a></li>
            <li><a href="#contact">КОНТАКТЫ</a></li>
        </ul>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <h1>FIERTE</h1>
            <p class="hero-subtitle">
                <span id="dev-text">DEVELOPER</span><br>
                Python · Telegram Bots · Web
            </p>
            <div class="hero-cta">
                <a href="#projects" class="cta-btn">ПРОЕКТЫ</a>
            </div>
        </div>
        <div class="scroll-indicator">
            <div class="mouse">
                <div class="wheel"></div>
            </div>
        </div>
    </section>

    <section id="projects">
        <div class="section-header fade-in">
            <h2 class="section-title">ПРОЕКТЫ</h2>
            <span class="section-subtitle">АКТИВНЫЕ РАЗРАБОТКИ</span>
        </div>
        <div class="projects-grid" id="projects-grid"></div>
    </section>

    <section id="skills">
        <div class="section-header fade-in">
            <h2 class="section-title">СТЕК</h2>
            <span class="section-subtitle">ТЕХНОЛОГИИ И ИНСТРУМЕНТЫ</span>
        </div>
        <div class="skills-container" id="skills-container"></div>
    </section>

    <section id="contact">
        <div class="contact fade-in">
            <h2 class="section-title">КОНТАКТЫ</h2>
            <p class="contact-text">
                Открыт к сотрудничеству и новым проектам
            </p>
            <div class="social-links">
                <a href="https://github.com/firte1337" target="_blank" class="social-link" title="GitHub">
                    <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
                    </svg>
                </a>
                <a href="https://t.me/fierte1337" class="social-link" title="Telegram">
                    <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/>
                    </svg>
                </a>
            </div>
        </div>
    </section>

    <footer>
        <p>Fierte &mdash; <span id="year">2025</span></p>
    </footer>

    <script>
        const PROJECTS = [
            {
                id: 1,
                title: "SilentByte",
                category: "Веб-сайт",
                description: "Коллекция онлайн-инструментов: транслитерация, BASE64, ASCII art, генератор паролей, невидимые символы, YouTube конвертер.",
                tech: ["HTML/CSS/JS", "Canvas", "Python"],
                status: "Запущен",
                link: "https://silent-byte.xyz/"
            },
            {
                id: 2,
                title: "Sieka Music Bot",
                category: "Telegram Bot",
                description: "Поиск и скачивание музыки с YouTube. Поддержка множества языков, настройка битрейта, история поиска, похожие треки.",
                tech: ["Python", "aiogram 3", "yt-dlp", "YouTube API", "SQLite"],
                status: "Работает",
                link: "https://t.me/siekamusicbot"
            }
        ];

        const SKILLS = [
            { name: "Python", level: 90 },
            { name: "aiogram", level: 88 },
            { name: "HTML/CSS/JS", level: 82 },
            { name: "SQL/SQLAlchemy", level: 75 },
            { name: "YouTube API", level: 72 },
            { name: "yt-dlp", level: 70 },
            { name: "Git/GitHub", level: 70 },
            { name: "VibeCoding", level: 1000 }
        ];

        function renderProjects() {
            const grid = document.getElementById('projects-grid');
            grid.innerHTML = PROJECTS.map(project => {
                const cardContent = `
                    <div class="project-status">${project.status}</div>
                    <h3 class="project-title">${project.title}</h3>
                    <p class="project-desc">${project.description}</p>
                    <div class="project-tech">
                        ${project.tech.map(tech => `<span class="tech-tag">${tech}</span>`).join('')}
                    </div>
                `;
                if (project.link) {
                    return `<a href="${project.link}" target="_blank" class="project-card fade-in">${cardContent}</a>`;
                }
                return `<div class="project-card fade-in">${cardContent}</div>`;
            }).join('');
        }

        function renderSkills() {
            const container = document.getElementById('skills-container');
            container.innerHTML = SKILLS.map(skill => `
                <div class="skill-item fade-in">
                    <div class="skill-header">
                        <span class="skill-name">${skill.name}</span>
                        <span class="skill-level">${skill.level}%</span>
                    </div>
                    <div class="skill-bar">
                        <div class="skill-progress" data-level="${skill.level}"></div>
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('year').textContent = new Date().getFullYear();

        renderProjects();
        renderSkills();

        // --- Particles ---
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 50; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 20 + 's';
            particle.style.animationDuration = (Math.random() * 10 + 15) + 's';
            particlesContainer.appendChild(particle);
        }

        // --- Background Canvas (Rising Particles) ---
        const bgCanvas = document.getElementById('bg-canvas');
        const bgCtx = bgCanvas.getContext('2d');

        function resizeBg() {
            bgCanvas.width = window.innerWidth;
            bgCanvas.height = window.innerHeight;
        }

        resizeBg();

        const bgParticles = [];
        const bgParticleCount = 300;

        class BgParticle {
            constructor() {
                this.reset();
                this.y = Math.random() * bgCanvas.height;
            }

            reset() {
                this.x = Math.random() * bgCanvas.width;
                this.y = -10;
                this.speed = Math.random() * 2 + 0.5;
                this.size = Math.random() * 2 + 1;
                this.opacity = Math.random() * 0.5 + 0.3;
            }

            update() {
                this.y += this.speed;
                if (this.y > bgCanvas.height) this.reset();
            }

            draw() {
                bgCtx.beginPath();
                bgCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                bgCtx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                bgCtx.fill();
            }
        }

        for (let i = 0; i < bgParticleCount; i++) {
            bgParticles.push(new BgParticle());
        }

        function animateBg() {
            bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
            bgParticles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateBg);
        }

        animateBg();
        window.addEventListener('resize', resizeBg);

        // --- Heart Explosion ---
        const logo = document.getElementById('logo');
        const heartContainer = document.getElementById('heart-container');

        logo.addEventListener('click', (e) => {
            const rect = logo.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            for (let i = 0; i < 12; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'minimal-heart';
                    const angle = (Math.PI * 2 / 12) * i;
                    const x = centerX + Math.cos(angle) * 40 - 8;
                    const y = centerY + Math.sin(angle) * 40 - 8;
                    heart.style.left = x + 'px';
                    heart.style.top = y + 'px';
                    heartContainer.appendChild(heart);
                    setTimeout(() => heart.remove(), 2000);
                }, i * 50);
            }
        });

        // --- Scroll Animations ---
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    const progress = entry.target.querySelector('.skill-progress');
                    if (progress) {
                        setTimeout(() => {
                            progress.style.width = progress.getAttribute('data-level') + '%';
                        }, 200);
                    }
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));

        // --- Smooth Scroll ---
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function(e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth' });
                }
            });
        });

        // --- Glitch Animation ---
        const devText = document.getElementById('dev-text');
        const originalText = 'DEVELOPER';
        let isGlitching = false;

        function doGlitch() {
            if (isGlitching) return;
            isGlitching = true;

            const r = Math.random();

            if (r < 0.3) {
                devText.textContent = 'VIBECODING';
                devText.className = 'glitch-red';
                setTimeout(() => {
                    devText.textContent = originalText;
                    devText.className = '';
                    isGlitching = false;
                }, 800);
            } else if (r < 0.6) {
                devText.textContent = 'DEVELOPER FAKE';
                devText.className = 'glitch';
                setTimeout(() => {
                    devText.textContent = originalText;
                    devText.className = '';
                    isGlitching = false;
                }, 600);
            } else {
                isGlitching = false;
            }
        }

        setInterval(doGlitch, 3000);
    </script>
</body>
</html>
